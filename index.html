<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="RxJS のストリームが時系列・並行にどう流れるかをアニメーションで可視化する学習用ツール"
    />
    <title>RxJS Visualizer — ストリームを時系列で見る</title>
  </head>
  <body>
    <div id="app">
      <header class="app-header">
        <h1>RxJS&nbsp;Visualizer</h1>
        <p class="tagline">
          RxJS の値が「いつ・どの順で・並行に」流れるかをアニメーションで見る
        </p>
      </header>
      <div class="layout">
        <nav id="scenario-list" class="scenario-list" aria-label="シナリオ一覧"></nav>
        <main id="stage" class="stage"></main>
      </div>
      <footer class="app-footer">
        <span
          >仮想時間スケジューラ（VirtualTimeScheduler）で実際の RxJS
          を実行し、発火を記録して再生しています。</span
        >
      </footer>
    </div>
    <script type="module" src="/src/app.ts"></script>
  </body>
</html>
